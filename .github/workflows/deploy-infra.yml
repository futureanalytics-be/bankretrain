# =============================================================================
# BankRetain — Infrastructure Deployment Pipeline
# Triggers on push to infra/ folder or manual dispatch
#
# Auth: OIDC (no stored client secret — federated identity credential)
# Order: ml-rg first (outputs featurePipelineMIPrincipalId), then ai-rg
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write   # required for OIDC federated auth
  contents: read

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}          # GitHub Actions SP client ID
  ML_RESOURCE_GROUP: bankretain-ml-rg
  AI_RESOURCE_GROUP: bankretain-ai-rg
  LOCATION: swedencentral
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Pre-flight validation
  # Compiles both Bicep templates without requiring Azure authentication.
  # Catches Bicep/ARM syntax and module wiring errors early.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Bicep templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile ML resource group template
        run: |
          az bicep build --file infra/ml-rg/main.bicep --stdout > /dev/null

      - name: Compile AI resource group template
        run: |
          az bicep build --file infra/ai-rg/main.bicep --stdout > /dev/null

  # ---------------------------------------------------------------------------
  # Job 1: Deploy ML Resource Group
  # Creates SQL, AML workspace, feature store, storage, Key Vault, RBAC
  # Outputs featurePipelineMIPrincipalId for use in Job 2
  # ---------------------------------------------------------------------------
  deploy-ml-rg:
    name: Deploy bankretain-ml-rg
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      featurePipelineMIPrincipalId: ${{ steps.ml-deploy.outputs.featurePipelineMIPrincipalId }}
      amlWorkspaceName: ${{ steps.ml-deploy.outputs.amlWorkspaceName }}
      storageAccountName: ${{ steps.ml-deploy.outputs.storageAccountName }}
      keyVaultName: ${{ steps.ml-deploy.outputs.keyVaultName }}
      sqlServerFqdn: ${{ steps.ml-deploy.outputs.sqlServerFqdn }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC — no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if not exists
        run: |
          az group create \
            --name ${{ env.ML_RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags project=bankretain environment=${{ env.ENVIRONMENT }} layer=ml

      - name: Deploy ML resource group (Bicep)
        id: ml-deploy
        run: |
          OUTPUT=$(az deployment group create \
            --name bankretain-ml-${{ env.ENVIRONMENT }}-${{ github.run_number }} \
            --resource-group ${{ env.ML_RESOURCE_GROUP }} \
            --template-file infra/ml-rg/main.bicep \
            --parameters \
              environment=${{ env.ENVIRONMENT }} \
              location=${{ env.LOCATION }} \
              developerObjectId="${{ secrets.DEVELOPER_OBJECT_ID }}" \
              githubActionsPrincipalId="${{ secrets.ACTIONS_SP_OBJECT_ID }}" \
            --query "properties.outputs" \
            --output json)

          echo "featurePipelineMIPrincipalId=$(echo $OUTPUT | jq -r '.featurePipelineMIPrincipalId.value')" >> $GITHUB_OUTPUT
          echo "amlWorkspaceName=$(echo $OUTPUT | jq -r '.amlWorkspaceName.value')" >> $GITHUB_OUTPUT
          echo "storageAccountName=$(echo $OUTPUT | jq -r '.storageAccountName.value')" >> $GITHUB_OUTPUT
          echo "keyVaultName=$(echo $OUTPUT | jq -r '.keyVaultName.value')" >> $GITHUB_OUTPUT
          echo "sqlServerFqdn=$(echo $OUTPUT | jq -r '.sqlServerFqdn.value')" >> $GITHUB_OUTPUT

      - name: Store key outputs as GitHub Actions environment variables
        run: |
          echo "AML_WORKSPACE_NAME=${{ steps.ml-deploy.outputs.amlWorkspaceName }}" >> $GITHUB_ENV
          echo "STORAGE_ACCOUNT_NAME=${{ steps.ml-deploy.outputs.storageAccountName }}" >> $GITHUB_ENV

  # ---------------------------------------------------------------------------
  # Job 2: Deploy AI Resource Group
  # Depends on ml-rg to get featurePipelineMIPrincipalId
  # Creates Foundry hub, project, AI Search, Key Vault, RBAC
  # ---------------------------------------------------------------------------
  deploy-ai-rg:
    name: Deploy bankretain-ai-rg
    runs-on: ubuntu-latest
    needs: deploy-ml-rg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if not exists
        run: |
          az group create \
            --name ${{ env.AI_RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags project=bankretain environment=${{ env.ENVIRONMENT }} layer=ai

      - name: Guard — featurePipelineMIPrincipalId must not be empty
        run: |
          MI_ID="${{ needs.deploy-ml-rg.outputs.featurePipelineMIPrincipalId }}"
          if [ -z "$MI_ID" ] || [ "$MI_ID" = "null" ]; then
            echo "featurePipelineMIPrincipalId is empty — ml-rg deploy may have failed to output it"
            exit 1
          fi
          echo "featurePipelineMIPrincipalId: $MI_ID"

      - name: Deploy AI resource group (Bicep)
        run: |
          az deployment group create \
            --name bankretain-ai-${{ env.ENVIRONMENT }}-${{ github.run_number }} \
            --resource-group ${{ env.AI_RESOURCE_GROUP }} \
            --template-file infra/ai-rg/main.bicep \
            --parameters \
              environment=${{ env.ENVIRONMENT }} \
              location=${{ env.LOCATION }} \
              featurePipelineMIPrincipalId="${{ needs.deploy-ml-rg.outputs.featurePipelineMIPrincipalId }}" \
              developerObjectId="${{ secrets.DEVELOPER_OBJECT_ID }}" \
              githubActionsPrincipalId="${{ secrets.ACTIONS_SP_OBJECT_ID }}"

  # ---------------------------------------------------------------------------
  # Job 3: Post-deployment validation
  # Verifies key resources exist and are in Succeeded state
  # ---------------------------------------------------------------------------
  validate-deployment:
    name: Validate deployment
    runs-on: ubuntu-latest
    needs: [deploy-ml-rg, deploy-ai-rg]

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate ML resource group resources
        run: |
          echo "=== ML Resource Group Resources ==="
          az resource list \
            --resource-group ${{ env.ML_RESOURCE_GROUP }} \
            --query "[].{Name:name, Type:type, State:provisioningState}" \
            --output table

      - name: Validate AI resource group resources
        run: |
          echo "=== AI Resource Group Resources ==="
          az resource list \
            --resource-group ${{ env.AI_RESOURCE_GROUP }} \
            --query "[].{Name:name, Type:type, State:provisioningState}" \
            --output table

      - name: Confirm AML workspace is ready
        run: |
          AML_WS="${{ needs.deploy-ml-rg.outputs.amlWorkspaceName }}"
          STATE=$(az ml workspace show \
            --name $AML_WS \
            --resource-group ${{ env.ML_RESOURCE_GROUP }} \
            --query "provisioningState" \
            --output tsv)
          if [ "$STATE" != "Succeeded" ]; then
            echo "AML workspace not in Succeeded state: $STATE"
            exit 1
          fi
          echo "AML workspace $AML_WS is ready (state: $STATE)"

      - name: Post deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| bankretain-ml-rg | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| bankretain-ai-rg | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AML Workspace:** ${{ needs.deploy-ml-rg.outputs.amlWorkspaceName }}" >> $GITHUB_STEP_SUMMARY
          echo "**SQL Server:** ${{ needs.deploy-ml-rg.outputs.sqlServerFqdn }}" >> $GITHUB_STEP_SUMMARY
